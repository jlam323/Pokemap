<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="icon" type="image/svg+xml" href="/pokeball-icon.svg" />
    <title>PokeMap</title>
    <script>
      // Force trailing slash for /pokemap subdirectory deployments
      (function() {
        var p = window.location.pathname;
        if (p.toLowerCase().endsWith('/pokemap')) {
          window.location.replace(p + '/');
        }
      })();
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="./src/main.tsx"></script>
  </body>
</html>
